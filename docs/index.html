<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stock Watcher</title>
</head>

<body>

    <h1>Stock Watcher</h1>

    <pre id="data"></pre>

    <script>
        fetch("status.json")
            .then(r => r.json())
            .then(data => {
                document.getElementById("data").textContent =
                    JSON.stringify(data, null, 2);
            });
    </script>

</body>

</html>
